version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      front-end-deps:
        patterns:
          - "@nuxt*"
          - "@pinia*"
          - "@unocss*"
          - "@vite-pwa*"
          - "@vueuse*"
          - "nuxt"
          - "pinia"
          - "unocss"
          - "vue"
      back-end-deps:
        patterns:
          - "cors"
          - "dotenv"
          - "express"
      tooling:
        patterns:
          - "@types*"
          - "eslint*"
          - "prettier"
          - "tsx"
          - "typescript"
          - "typescript-eslint"
