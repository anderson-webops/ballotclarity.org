services:
  postgres:
    image: postgres:16-alpine
    container_name: ballot-clarity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ballot_clarity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ballot_clarity_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ballot_clarity"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ballot_clarity_postgres:
